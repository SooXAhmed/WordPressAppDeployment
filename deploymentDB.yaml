apiVersion: apps/v1
kind : Deployment
metadata:
  name: database-deploy
  labels:
    app: word-press-app

spec:
  replicas: 1
  selector:
     matchLabels:
        app: word-press-app-database
  template:
    metadata:
      labels:
        app: word-press-app-database
    spec:
      containers:
       - name: word-press
         image: mysql:8.4
         ports:
          - containerPort: 3306 
         env:
          - name: MYSQL_DATABASE
            valueFrom:
              configMapKeyRef:
                name: mysql-config
                key: MYSQL_DATABASE

          - name: MYSQL_USER
            valueFrom:
              configMapKeyRef:
                name: mysql-config
                key: MYSQL_USER
          - name: MYSQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-secret
                key: MYSQL_PASSWORD
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-secret
                key: MYSQL_ROOT_PASSWORD
[root@master-node project2]# 
